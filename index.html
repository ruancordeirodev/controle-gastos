<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Gastos V6</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">

    <h1>Controle Financeiro V6</h1>

    <!-- DASHBOARD -->
    <div class="dashboard">

      <div class="card">
        <h3>Receitas</h3>
        <p id="income-total">R$ 0,00</p>
      </div>

      <div class="card">
        <h3>Despesas</h3>
        <p id="expense-total">R$ 0,00</p>
      </div>

      <div class="card">
        <h3>Saldo</h3>
        <p id="balance">R$ 0,00</p>
      </div>

    </div>

    <!-- GRÁFICO -->
    <canvas id="chart"></canvas>

    <!-- FILTROS -->
    <select id="filter-type">
      <option value="all">Todos tipos</option>
      <option value="income">Receitas</option>
      <option value="expense">Despesas</option>
    </select>

    <select id="filter-category">
      <option value="all">Todas categorias</option>
      <option value="alimentacao">Alimentação</option>
      <option value="transporte">Transporte</option>
      <option value="lazer">Lazer</option>
      <option value="outros">Outros</option>
    </select>

    <!-- FORM -->
    <form id="form">

      <input type="text" id="description" placeholder="Descrição" required>
      <input type="number" id="amount" placeholder="Valor" required>

      <select id="type">
        <option value="income">Receita</option>
        <option value="expense">Despesa</option>
      </select>

      <select id="category">
        <option value="alimentacao">Alimentação</option>
        <option value="transporte">Transporte</option>
        <option value="lazer">Lazer</option>
        <option value="outros">Outros</option>
      </select>

      <button type="submit">Adicionar</button>
    </form>

    <!-- EXPORT -->
    <button id="export">Exportar CSV</button>

    <!-- LISTA -->
    <ul id="list"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
